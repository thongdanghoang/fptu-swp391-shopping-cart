version: '3.8'
services:
  # proxy production setup
  proxy:
    build: proxy
    restart: always
    environment:
      - TZ=Asia/Bangkok
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./proxy/ssl:/etc/nginx/ssl
    ports:
      - 443:443
    depends_on:
      authorization-server:
        condition: service_healthy
      resource-server:
        condition: service_healthy

  authorization-server:
    build: authorization-server
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 3s
      retries: 5
      timeout: 10s
      start_period: 10s
    environment:
      TZ: Asia/Bangkok
      POSTGRES_HOST: authorization-database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MAILGUN_DOMAIN_NAME: ${MAILGUN_DOMAIN_NAME}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    depends_on:
      authorization-database:
        condition: service_healthy
    ports:
      - 8080:8080
  authorization-database:
    build: authorization-database
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 3s
      retries: 5
      timeout: 10s
      start_period: 10s
    environment:
      - TZ=Asia/Bangkok
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - 5432:5432

  resource-server:
    build: resource-server
    restart: always
    # Spring boot health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/actuator/health"]
      interval: 3s
      retries: 5
      timeout: 10s
      start_period: 10s
    environment:
      TZ: Asia/Bangkok
      MYSQL_HOST: resource-database
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      AUTH-SERVER: authorization-server
      AUTH-SERVER-PORT: 8080
      RESOURCE-SERVER-CLIENT-ID: ${RESOURCE-SERVER-CLIENT-ID}
      RESOURCE-SERVER-CLIENT-SECRET: ${RESOURCE-SERVER-CLIENT-SECRET}
      MAILGUN_DOMAIN_NAME: ${MAILGUN_DOMAIN_NAME}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
    depends_on:
      resource-database:
        condition: service_healthy
    ports:
      - 8000:8000
  resource-database:
    build: resource-database
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent" ]
      interval: 3s
      retries: 5
      timeout: 10s
      start_period: 10s
    environment:
      TZ: Asia/Bangkok
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - 3306:3306